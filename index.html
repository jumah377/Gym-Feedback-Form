<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🏋️ Gym Feedback</title>

<style>

body{
font-family:"Segoe UI", Arial;
background:linear-gradient(135deg,#111,#1c1c1c);
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:30px;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* HERO */
.hero{
height:220px;
overflow:hidden;
border-radius:12px;
margin-bottom:20px;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
}

/* TITLE */
h1{
text-align:center;
color:#e31c23;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:20px;
}

/* PROGRESS */
.progress-container{
margin-bottom:20px;
}

.progress-text{
text-align:center;
margin-bottom:5px;
font-weight:bold;
}

.progress-bar{
height:10px;
background:#eee;
border-radius:10px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#e31c23;
transition:0.3s;
}

/* QUESTIONS */
.question{
margin-top:25px;
padding:20px;
background:#fafafa;
border-radius:12px;
}

/* RATING */
.rating-group{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.rating-group input{
display:none;
}

.rating-group label{
flex:1;
min-width:120px;
padding:18px 10px;
text-align:center;
border-radius:14px;
cursor:pointer;
color:white;
font-weight:600;
transition:0.2s;
}

/* EMOJI BIG */
.emoji{
font-size:34px;
display:block;
margin-bottom:5px;
}

/* COLORS */
.vp{background:#d32f2f;}
.p{background:#f57c00;}
.a{background:#fbc02d; color:black;}
.g{background:#7cb342;}
.e{background:#2e7d32;}

.rating-group input:checked + label{
transform:scale(1.08);
box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* THANK YOU */
#thankyou{
display:none;
text-align:center;
padding:60px;
}

</style>

</head>

<body>

<div class="container">

<!-- IMAGE -->
<div class="hero">
<img src="rush-banner.jpg">
</div>

<h1>🏋️ Rush Fitness Feedback Hub-Help Us Build a Better Gym</h1>
<p class="subtitle">Tap your experience 💪</p>

<!-- PROGRESS -->
<div class="progress-container">
<div class="progress-text" id="progressText">0 of 5</div>
<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>
</div>

<form id="feedbackForm">

<!-- Q1 -->
<div class="question">
<h3>Overall Experience</h3>
<div class="rating-group">

<input type="radio" id="o1" name="overall" value="Very Poor">
<label for="o1" class="vp">
<span class="emoji">😡</span>
Very Poor
</label>

<input type="radio" id="o2" name="overall" value="Poor">
<label for="o2" class="p">
<span class="emoji">🙁</span>
Poor
</label>

<input type="radio" id="o3" name="overall" value="Average">
<label for="o3" class="a">
<span class="emoji">😐</span>
Average
</label>

<input type="radio" id="o4" name="overall" value="Good">
<label for="o4" class="g">
<span class="emoji">🙂</span>
Good
</label>

<input type="radio" id="o5" name="overall" value="Excellent">
<label for="o5" class="e">
<span class="emoji">🤩</span>
Excellent
</label>

</div>
</div>

<!-- Q2 -->
<div class="question">
<h3>Cleanliness & Hygiene</h3>
<div class="rating-group">

<input type="radio" id="c1" name="cleanliness" value="Very Poor">
<label for="c1" class="vp"><span class="emoji">😡</span>Very Poor</label>

<input type="radio" id="c2" name="cleanliness" value="Poor">
<label for="c2" class="p"><span class="emoji">🙁</span>Poor</label>

<input type="radio" id="c3" name="cleanliness" value="Average">
<label for="c3" class="a"><span class="emoji">😐</span>Average</label>

<input type="radio" id="c4" name="cleanliness" value="Good">
<label for="c4" class="g"><span class="emoji">🙂</span>Good</label>

<input type="radio" id="c5" name="cleanliness" value="Excellent">
<label for="c5" class="e"><span class="emoji">🤩</span>Excellent</label>

</div>
</div>

<!-- Q3 -->
<div class="question">
<h3>Customer Service Support</h3>
<div class="rating-group">

<input type="radio" id="s1" name="customer_service" value="Very Poor">
<label for="s1" class="vp"><span class="emoji">😡</span>Very Poor</label>

<input type="radio" id="s2" name="customer_service" value="Poor">
<label for="s2" class="p"><span class="emoji">🙁</span>Poor</label>

<input type="radio" id="s3" name="customer_service" value="Average">
<label for="s3" class="a"><span class="emoji">😐</span>Average</label>

<input type="radio" id="s4" name="customer_service" value="Good">
<label for="s4" class="g"><span class="emoji">🙂</span>Good</label>

<input type="radio" id="s5" name="customer_service" value="Excellent">
<label for="s5" class="e"><span class="emoji">🤩</span>Excellent</label>

</div>
</div>

<!-- Q4 -->
<div class="question">
<h3>Trainer Support</h3>
<div class="rating-group">

<input type="radio" id="t1" name="trainer_support" value="Very Poor">
<label for="t1" class="vp"><span class="emoji">😡</span>Very Poor</label>

<input type="radio" id="t2" name="trainer_support" value="Poor">
<label for="t2" class="p"><span class="emoji">🙁</span>Poor</label>

<input type="radio" id="t3" name="trainer_support" value="Average">
<label for="t3" class="a"><span class="emoji">😐</span>Average</label>

<input type="radio" id="t4" name="trainer_support" value="Good">
<label for="t4" class="g"><span class="emoji">🙂</span>Good</label>

<input type="radio" id="t5" name="trainer_support" value="Excellent">
<label for="t5" class="e"><span class="emoji">🤩</span>Excellent</label>

</div>
</div>

<!-- Q5 -->
<div class="question">
<h3>Would you recommend us?</h3>
<div class="rating-group">

<input type="radio" id="r1" name="recommend" value="No">
<label for="r1" class="vp"><span class="emoji">❌</span>No</label>

<input type="radio" id="r2" name="recommend" value="Maybe">
<label for="r2" class="a"><span class="emoji">🤔</span>Maybe</label>

<input type="radio" id="r3" name="recommend" value="Yes">
<label for="r3" class="e"><span class="emoji">✅</span>Yes</label>

</div>
</div>

</form>

<div id="thankyou">
<h2>🎉 Thank You!</h2>
</div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbyBmofsKdaZxTNnABHTHnY7_cKoPS8ujazSLA11eA3fNrxclayR07UfGeTyF8ubioVe7A/exec";

let submitting=false;

const inputs=document.querySelectorAll("input[type=radio]");
const form=document.getElementById("feedbackForm");

const progressFill=document.getElementById("progressFill");
const progressText=document.getElementById("progressText");

inputs.forEach(input=>{
input.addEventListener("change",()=>{

if(submitting) return;

let fields=["overall","cleanliness","customer_service","trainer_support","recommend"];
let answered=0;

fields.forEach(f=>{
if(document.querySelector(`input[name="${f}"]:checked`)){
answered++;
}
});

progressFill.style.width=(answered/5)*100+"%";
progressText.innerText=answered+" of 5";

if(answered===5){
submitForm();
}

});
});

function submitForm(){

if(submitting) return;
submitting=true;

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})
.then(()=>{
form.style.display="none";
document.getElementById("thankyou").style.display="block";

setTimeout(()=>{
form.reset();
progressFill.style.width="0%";
progressText.innerText="0 of 5";
document.getElementById("thankyou").style.display="none";
form.style.display="block";
submitting=false;
},3000);

})
.catch(()=>{
alert("Submission failed.");
submitting=false;
});

}

</script>

</body>
</html>
